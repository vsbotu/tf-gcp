# Triggers vsbotu/smoketest: .github/workflows/smoke-test.yml via workflow_dispatch (REST API).
# Reusable workflows (jobs.*.uses: owner/repo/...) require smoketest "Access" to allow this repo; if that
# fails with "workflow was not found", this dispatch path still works with a PAT — see secret below.
#
# Secret: SMOKETEST_TRIGGER_TOKEN — classic PAT with `workflow` scope (or fine-grained: Actions write on smoketest).
# GITHUB_TOKEN cannot trigger workflows in another repository.

name: Smoke test (trigger smoketest repo)

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Passed to smoketest as input fail (rollback drill)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Run smoketest workflow
        env:
          GH_TOKEN: ${{ secrets.SMOKETEST_TRIGGER_TOKEN }}
        run: |
          gh workflow run smoke-test.yml \
            --repo vsbotu/smoketest \
            --ref main \
            -f fail=${{ inputs.fail }}
