# Dispatches local reusable ./smoke-test-reusable.yml (same `fail` contract as vsbotu/smoketest).
# Cross-repo uses: vsbotu/smoketest/... only works after org Actions allows private reusable workflows.

name: Smoke test (call smoketest repo)

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "If true, smoketest job fails on purpose (rollback drill)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests
    uses: ./.github/workflows/smoke-test-reusable.yml
    with:
      fail: ${{ inputs.fail }}
