# Standalone: calls vsbotu/smoketest reusable workflow only.
# Smoketest workflow_call must define input `fail` (boolean) — see that repo's smoke-test.yml.
#
# If "workflow was not found": org must allow this repo to use reusable workflows from smoketest
# (Settings → Actions → General → Fork pull request workflows / access to reusable workflows).

name: Smoke test (call smoketest repo)

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "If true, smoketest job fails on purpose (rollback drill)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  smoke:
    name: Smoke tests
    uses: vsbotu/smoketest/.github/workflows/smoke-test.yml@main
    with:
      fail: ${{ inputs.fail }}
