# Thin dispatcher: runs vsbotu/smoketest reusable workflow only.
# Private repo: org Actions must allow tf-gcp to use reusable workflows from smoketest, or parse fails with "workflow was not found".

name: Smoke test (call smoketest repo)

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "If true, smoketest job fails on purpose (rollback drill)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests
    uses: vsbotu/smoketest/.github/workflows/smoke-test.yml@main
    with:
      fail: ${{ inputs.fail }}
