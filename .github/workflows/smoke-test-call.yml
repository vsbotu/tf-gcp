# Calls vsbotu/smoketest reusable workflow via workflow_call (see that repo’s smoke-test.yml).
# Private repos in the same org: supported — no PAT. If the run errors on “workflow not found” or access,
# check Org Settings → Actions → General (workflow/reusable-workflow policies) and that both repos have Actions enabled.

name: Smoke test (call smoketest repo)

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Passed to smoketest as input fail (rollback drill)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke-test:
    uses: vsbotu/smoketest/.github/workflows/smoke-test.yml@main
    with:
      fail: ${{ inputs.fail }}
