# Calls vsbotu/smoketest reusable workflow via workflow_call (see that repo’s smoke-test.yml).
#
# Private repos — if you see "workflow was not found" when queueing, smoketest must not be "Not accessible":
#   smoketest → Settings → Actions → General → "Access" → e.g. "Accessible from repositories owned by the user 'vsbotu'"
#   (or "… in the '<ORG>' organization" if both repos live under that org) → Save.
# Docs: https://docs.github.com/en/actions/sharing-automations/sharing-actions-and-workflows-with-your-organization
#       https://docs.github.com/en/actions/how-tos/reuse-automations/share-across-private-repositories
# Also confirm the workflow exists on ref @main (or pin a commit SHA).

name: Smoke test (call smoketest repo)

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Passed to smoketest as input fail (rollback drill)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke-test:
    uses: vsbotu/smoketest/.github/workflows/smoke-test.yml@main
    with:
      fail: ${{ inputs.fail }}
