# Calls reusable workflows [.github/workflows/helm-deploy-nginx1.yml] and
# [helm-deploy-nginx2.yml] (parallel), then smoke tests.
#
# Smoke failure marks the smoke-tests job failed (red). Rollback intent is passed via artifact
# smoke-meta.json + job "evaluate-rollback" (GitHub does not expose outputs from failed jobs).
# Job IDs with hyphens: use needs['job-id'] in expressions — needs.evaluate-rollback is parsed as subtraction.
# workflow-result: green if smoke passed, or smoke failed and rollback succeeded; red otherwise.
#
# On smoke failure: optional manual approval (GitHub Environment), then Helm rollback.
#
# Environment "helm-rollback": create under Settings → Environments → add "Required reviewers"
# so the rollback job waits for approval before running helm rollback.
#
# First install: empty previous_revision → rollback step skips that release.
# Rollback is Helm-only, not Terraform.
#
# Testing rollback: use simulate_smoke_failure after at least one successful deploy so revisions exist.
#
# Auth: repo variables GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_SA_EMAIL, GCP_WIF_AUDIENCE;
# optional GKE_CLUSTER_NAME, GKE_ZONE.

name: Helm nginx1+nginx2 (smoke + rollback)

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace (created if missing)"
        type: string
        default: "demo"
      simulate_smoke_failure:
        description: "If true, force smoke to fail after checks (tests rollback; needs prior Helm revision)"
        type: boolean
        default: false
      skip_rollback_approval:
        description: "If true, run helm rollback immediately without waiting for Environment approval (CI/lab only)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  actions: write # upload-artifact (smoke-meta for evaluate-rollback)

env:
  RELEASE_1: nginx1
  RELEASE_2: nginx2

jobs:
  nginx1:
    uses: ./.github/workflows/helm-deploy-nginx1.yml
    with:
      namespace: ${{ inputs.namespace }}

  nginx2:
    uses: ./.github/workflows/helm-deploy-nginx2.yml
    with:
      namespace: ${{ inputs.namespace }}

  smoke-tests:
    needs: [nginx1, nginx2]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required variables (WIF + project)
        run: |
          set -euo pipefail
          missing=()
          [ -z "${{ vars.GCP_PROJECT_ID }}" ] && missing+=(GCP_PROJECT_ID)
          [ -z "${{ vars.GCP_WIF_PROVIDER }}" ] && missing+=(GCP_WIF_PROVIDER)
          [ -z "${{ vars.GCP_SA_EMAIL }}" ] && missing+=(GCP_SA_EMAIL)
          [ -z "${{ vars.GCP_WIF_AUDIENCE }}" ] && missing+=(GCP_WIF_AUDIENCE)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          audience: ${{ vars.GCP_WIF_AUDIENCE }}

      - name: Set up gcloud and kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get GKE credentials
        env:
          CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
          ZONE: ${{ vars.GKE_ZONE }}
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER:-gke-us-east1-demo}"
          ZONE="${ZONE:-us-east1-b}"
          echo "Using cluster=$CLUSTER zone=$ZONE"
          gcloud container clusters get-credentials "$CLUSTER" \
            --zone "$ZONE" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Smoke tests
        id: smoke
        env:
          NS: ${{ inputs.namespace }}
          PREV1: ${{ needs.nginx1.outputs.previous_revision }}
          PREV2: ${{ needs.nginx2.outputs.previous_revision }}
          SIMULATE_SMOKE_FAILURE: ${{ inputs.simulate_smoke_failure }}
        run: |
          set -euo pipefail

          echo "=== Revisions before deploy (from called workflows) ==="
          echo "PREV_${{ env.RELEASE_1 }}=${PREV1:-<none>}"
          echo "PREV_${{ env.RELEASE_2 }}=${PREV2:-<none>}"

          smoke_ok=true

          echo "=== Smoke: rollout status ==="
          kubectl rollout status "deployment/${{ env.RELEASE_1 }}" -n "$NS" --timeout=120s || smoke_ok=false
          kubectl rollout status "deployment/${{ env.RELEASE_2 }}" -n "$NS" --timeout=120s || smoke_ok=false

          echo "=== Smoke: in-cluster HTTP (curl pod) ==="
          POD="smoke-curl-${GITHUB_RUN_ID}"
          kubectl delete pod "$POD" -n "$NS" --ignore-not-found --wait=true 2>/dev/null || true
          kubectl run "$POD" -n "$NS" --restart=Never --image=curlimages/curl:8.5.0 \
            --command -- sh -c 'curl -sf "http://${{ env.RELEASE_1 }}/" >/dev/null && curl -sf "http://${{ env.RELEASE_2 }}/" >/dev/null'
          if ! kubectl wait --for=jsonpath='{.status.phase}'=Succeeded "pod/$POD" -n "$NS" --timeout=120s; then
            echo "::warning::curl smoke pod did not succeed; dumping logs"
            kubectl logs "pod/$POD" -n "$NS" 2>/dev/null || true
            kubectl describe "pod/$POD" -n "$NS" || true
            smoke_ok=false
          fi
          kubectl delete pod "$POD" -n "$NS" --ignore-not-found

          NEEDS_ROLLBACK=false
          if [ "${SIMULATE_SMOKE_FAILURE}" = "true" ]; then
            echo "::warning::simulate_smoke_failure is true — treating as rollback candidate"
            NEEDS_ROLLBACK=true
          elif [ "$smoke_ok" != true ]; then
            NEEDS_ROLLBACK=true
          fi

          # Written before exit so upload-artifact can pass intent to evaluate-rollback (failed jobs have no outputs).
          printf '{"needs_rollback":"%s","namespace":"%s"}\n' "$NEEDS_ROLLBACK" "$NS" > smoke-meta.json

          if [ "$NEEDS_ROLLBACK" = "true" ]; then
            echo "::error::Smoke tests failed (or simulated). After approval, rollback will run. Overall status is decided in workflow-result."
            exit 1
          fi

          echo "=== OK: smoke passed ==="
          kubectl get deploy,svc,pods -n "$NS" \
            -l "app.kubernetes.io/instance in (${{ env.RELEASE_1 }},${{ env.RELEASE_2 }})"

      - name: Upload smoke metadata for rollback jobs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-meta
          path: smoke-meta.json
          if-no-files-found: warn

  evaluate-rollback:
    name: Evaluate rollback
    needs: [nginx1, nginx2, smoke-tests]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      needs_rollback: ${{ steps.parse.outputs.needs_rollback }}
    steps:
      - name: Download smoke metadata
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: smoke-meta
          path: .

      - name: Parse smoke metadata
        id: parse
        run: |
          set -euo pipefail
          META=""
          if [ -f smoke-meta.json ]; then
            META=smoke-meta.json
          else
            META=$(find . -name smoke-meta.json -print -quit 2>/dev/null || true)
          fi
          if [ -z "$META" ] || [ ! -f "$META" ]; then
            echo "needs_rollback=false" >> "$GITHUB_OUTPUT"
            echo "No smoke-meta.json (smoke job failed before writing metadata, or upload missing)"
            exit 0
          fi
          NEEDS=$(jq -r .needs_rollback "$META" | tr -d '\r\n')
          echo "needs_rollback=$NEEDS" >> "$GITHUB_OUTPUT"
          echo "Parsed needs_rollback=$NEEDS from $META"

  rollback-after-approval:
    needs: [nginx1, nginx2, evaluate-rollback]
    # Boolean workflow_dispatch inputs: use !inputs.* / inputs.* — avoid == false / == true (often skips jobs).
    if: ${{ needs['evaluate-rollback'].outputs.needs_rollback == 'true' && !inputs.skip_rollback_approval }}
    environment: helm-rollback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required variables (WIF + project)
        run: |
          set -euo pipefail
          missing=()
          [ -z "${{ vars.GCP_PROJECT_ID }}" ] && missing+=(GCP_PROJECT_ID)
          [ -z "${{ vars.GCP_WIF_PROVIDER }}" ] && missing+=(GCP_WIF_PROVIDER)
          [ -z "${{ vars.GCP_SA_EMAIL }}" ] && missing+=(GCP_SA_EMAIL)
          [ -z "${{ vars.GCP_WIF_AUDIENCE }}" ] && missing+=(GCP_WIF_AUDIENCE)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          audience: ${{ vars.GCP_WIF_AUDIENCE }}

      - name: Set up gcloud and kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get GKE credentials
        env:
          CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
          ZONE: ${{ vars.GKE_ZONE }}
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER:-gke-us-east1-demo}"
          ZONE="${ZONE:-us-east1-b}"
          gcloud container clusters get-credentials "$CLUSTER" \
            --zone "$ZONE" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Helm rollback (post-approval)
        env:
          NS: ${{ inputs.namespace }}
          PREV1: ${{ needs.nginx1.outputs.previous_revision }}
          PREV2: ${{ needs.nginx2.outputs.previous_revision }}
        run: |
          set -euo pipefail
          echo "::notice::Running Helm rollback after manual approval"
          ERR=0
          ATTEMPTED=0
          if [ -n "${PREV1}" ]; then
            ATTEMPTED=1
            if ! helm rollback "${{ env.RELEASE_1 }}" "${PREV1}" -n "$NS" --wait --timeout 5m; then
              echo "::error::rollback ${{ env.RELEASE_1 }} failed"
              ERR=1
            fi
          else
            echo "Skip rollback ${{ env.RELEASE_1 }}: no prior revision"
          fi
          if [ -n "${PREV2}" ]; then
            ATTEMPTED=1
            if ! helm rollback "${{ env.RELEASE_2 }}" "${PREV2}" -n "$NS" --wait --timeout 5m; then
              echo "::error::rollback ${{ env.RELEASE_2 }} failed"
              ERR=1
            fi
          else
            echo "Skip rollback ${{ env.RELEASE_2 }}: no prior revision"
          fi
          if [ "$ATTEMPTED" -eq 0 ]; then
            echo "::error::No prior Helm revision to roll back to"
            exit 1
          fi
          exit "$ERR"

  rollback-immediate:
    needs: [nginx1, nginx2, evaluate-rollback]
    if: ${{ needs['evaluate-rollback'].outputs.needs_rollback == 'true' && inputs.skip_rollback_approval }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required variables (WIF + project)
        run: |
          set -euo pipefail
          missing=()
          [ -z "${{ vars.GCP_PROJECT_ID }}" ] && missing+=(GCP_PROJECT_ID)
          [ -z "${{ vars.GCP_WIF_PROVIDER }}" ] && missing+=(GCP_WIF_PROVIDER)
          [ -z "${{ vars.GCP_SA_EMAIL }}" ] && missing+=(GCP_SA_EMAIL)
          [ -z "${{ vars.GCP_WIF_AUDIENCE }}" ] && missing+=(GCP_WIF_AUDIENCE)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          audience: ${{ vars.GCP_WIF_AUDIENCE }}

      - name: Set up gcloud and kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get GKE credentials
        env:
          CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
          ZONE: ${{ vars.GKE_ZONE }}
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER:-gke-us-east1-demo}"
          ZONE="${ZONE:-us-east1-b}"
          gcloud container clusters get-credentials "$CLUSTER" \
            --zone "$ZONE" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Helm rollback (no approval gate)
        env:
          NS: ${{ inputs.namespace }}
          PREV1: ${{ needs.nginx1.outputs.previous_revision }}
          PREV2: ${{ needs.nginx2.outputs.previous_revision }}
        run: |
          set -euo pipefail
          echo "::notice::Running Helm rollback (skip_rollback_approval=true)"
          ERR=0
          ATTEMPTED=0
          if [ -n "${PREV1}" ]; then
            ATTEMPTED=1
            if ! helm rollback "${{ env.RELEASE_1 }}" "${PREV1}" -n "$NS" --wait --timeout 5m; then
              echo "::error::rollback ${{ env.RELEASE_1 }} failed"
              ERR=1
            fi
          else
            echo "Skip rollback ${{ env.RELEASE_1 }}: no prior revision"
          fi
          if [ -n "${PREV2}" ]; then
            ATTEMPTED=1
            if ! helm rollback "${{ env.RELEASE_2 }}" "${PREV2}" -n "$NS" --wait --timeout 5m; then
              echo "::error::rollback ${{ env.RELEASE_2 }} failed"
              ERR=1
            fi
          else
            echo "Skip rollback ${{ env.RELEASE_2 }}: no prior revision"
          fi
          if [ "$ATTEMPTED" -eq 0 ]; then
            echo "::error::No prior Helm revision to roll back to"
            exit 1
          fi
          exit "$ERR"

  workflow-result:
    name: Workflow result
    needs: [smoke-tests, evaluate-rollback, rollback-after-approval, rollback-immediate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Set overall workflow status
        run: |
          set -euo pipefail
          SMOKE_JOB="${{ needs['smoke-tests'].result }}"
          EVAL_RB="${{ needs['evaluate-rollback'].outputs.needs_rollback }}"
          RB_A="${{ needs['rollback-after-approval'].result }}"
          RB_I="${{ needs['rollback-immediate'].result }}"

          if [ "$SMOKE_JOB" = "skipped" ]; then
            echo "::error::smoke-tests was skipped — check nginx deploy jobs"
            exit 1
          fi

          if [ "$SMOKE_JOB" = "cancelled" ]; then
            echo "::error::smoke-tests was cancelled"
            exit 1
          fi

          # Smoke passed — overall green (rollback jobs are skipped).
          if [ "$SMOKE_JOB" = "success" ]; then
            echo "Smoke passed — workflow OK"
            exit 0
          fi

          # smoke-tests failed (expected when rollback path is taken).
          if [ "$SMOKE_JOB" != "failure" ]; then
            echo "::error::Unexpected smoke-tests result: $SMOKE_JOB"
            exit 1
          fi

          if [ "$EVAL_RB" != "true" ]; then
            echo "::error::Smoke or setup failed without a rollback path (no rollback candidate). Check smoke-tests logs."
            exit 1
          fi

          if [ "$RB_A" = "success" ] || [ "$RB_I" = "success" ]; then
            echo "Smoke failed; rollback completed successfully — workflow OK"
            exit 0
          fi

          if [ "$RB_A" = "failure" ] || [ "$RB_I" = "failure" ]; then
            echo "::error::Rollback job failed — see rollback logs"
            exit 1
          fi

          if [ "$RB_A" = "cancelled" ] || [ "$RB_I" = "cancelled" ]; then
            echo "::error::Rollback was cancelled or still pending"
            exit 1
          fi

          echo "::error::Rollback was required but did not complete (rollback-after-approval=$RB_A rollback-immediate=$RB_I)"
          exit 1
