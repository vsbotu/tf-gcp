# Contract: workflow_call input `fail` (boolean), same as vsbotu/smoketest smoke-test.yml stub.
# Use this file while GitHub blocks private cross-repo `uses:` (parse error "workflow was not found").
# When org Actions allows tf-gcp → smoketest reuse, switch callers back to:
#   uses: vsbotu/smoketest/.github/workflows/smoke-test.yml@main
#
# Minimal stub: no smoke-meta artifact (full rollback metadata needs an extended smoketest workflow).

name: Smoke test

on:
  workflow_dispatch:
    inputs:
      fail:
        description: If true, fail on purpose (rollback drill)
        type: boolean
        default: false
  workflow_call:
    inputs:
      fail:
        type: boolean
        default: false

jobs:
  smoke_test:
    runs-on: ubuntu-latest
    steps:
      - name: Intentional failure (rollback drill)
        if: ${{ inputs.fail }}
        run: |
          echo "::error::Smoke test failed on purpose"
          exit 1

      - name: Smoke tests successful
        if: ${{ !inputs.fail }}
        run: echo "Smoke tests are successful"
