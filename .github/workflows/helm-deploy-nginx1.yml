# Deploy nginx as Helm release `nginx1` using app/nginx1/values.yaml
#
# Rollback: each upgrade creates a Helm revision. List: helm history nginx1 -n <ns>
# One step back: helm rollback nginx1 -n <ns>
# Specific rev: helm rollback nginx1 <revision> -n <ns>
#
# Auth: WIF variables (GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_SA_EMAIL, GCP_WIF_AUDIENCE).

name: Helm deploy nginx1

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace (created if missing)"
        type: string
        default: "demo"
  workflow_call:
    inputs:
      namespace:
        description: "Kubernetes namespace (created if missing)"
        type: string
        default: "demo"
    outputs:
      previous_revision:
        description: "Helm revision before upgrade (empty on first install)"
        value: ${{ jobs.deploy.outputs.previous_revision }}

permissions:
  contents: read
  id-token: write

env:
  CHART_PATH: deploy/helm/nginx-sample
  VALUES_FILE: app/nginx1/values.yaml
  RELEASE_NAME: nginx1

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      previous_revision: ${{ steps.capture.outputs.previous_revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required variables (WIF + project)
        run: |
          set -euo pipefail
          missing=()
          [ -z "${{ vars.GCP_PROJECT_ID }}" ] && missing+=(GCP_PROJECT_ID)
          [ -z "${{ vars.GCP_WIF_PROVIDER }}" ] && missing+=(GCP_WIF_PROVIDER)
          [ -z "${{ vars.GCP_SA_EMAIL }}" ] && missing+=(GCP_SA_EMAIL)
          [ -z "${{ vars.GCP_WIF_AUDIENCE }}" ] && missing+=(GCP_WIF_AUDIENCE)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          audience: ${{ vars.GCP_WIF_AUDIENCE }}

      - name: Set up gcloud and kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get GKE credentials
        env:
          CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
          ZONE: ${{ vars.GKE_ZONE }}
        run: |
          set -euo pipefail
          CLUSTER="${CLUSTER:-gke-us-east1-demo}"
          ZONE="${ZONE:-us-east1-b}"
          echo "Using cluster=$CLUSTER zone=$ZONE"
          gcloud container clusters get-credentials "$CLUSTER" \
            --zone "$ZONE" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Record Helm revision before upgrade
        id: capture
        run: |
          set -euo pipefail
          NS="${{ inputs.namespace }}"
          REL="${{ env.RELEASE_NAME }}"
          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
          REV=$(helm get metadata "$REL" -n "$NS" -o json 2>/dev/null | jq -r '.revision // empty' || true)
          echo "previous_revision=$REV" >> "$GITHUB_OUTPUT"
          echo "Recorded previous_revision=${REV:-<none>} for $REL in $NS"

      - name: Helm lint
        run: helm lint "${{ env.CHART_PATH }}" -f "${{ env.VALUES_FILE }}"

      - name: Helm template (dry-run render)
        run: helm template "${{ env.RELEASE_NAME }}" "${{ env.CHART_PATH }}" -f "${{ env.VALUES_FILE }}" -n "${{ inputs.namespace }}" --debug > /tmp/rendered.yaml && head -80 /tmp/rendered.yaml

      - name: Helm upgrade --install
        run: |
          kubectl create namespace "${{ inputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install "${{ env.RELEASE_NAME }}" "${{ env.CHART_PATH }}" \
            -f "${{ env.VALUES_FILE }}" \
            -n "${{ inputs.namespace }}" \
            --wait \
            --timeout 5m

      - name: Verify
        run: |
          kubectl get deploy,svc,pods -n "${{ inputs.namespace }}" -l "app.kubernetes.io/instance=${{ env.RELEASE_NAME }}"
          echo "Rollback hint: helm history ${{ env.RELEASE_NAME }} -n ${{ inputs.namespace }}"
