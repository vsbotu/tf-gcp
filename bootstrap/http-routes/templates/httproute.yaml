{{- range .Values.httpRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "http-routes.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gatewayRef.name }}
      namespace: {{ $.Values.gatewayRef.namespace }}
      sectionName: {{ $.Values.gatewayRef.sectionName }}
  rules:
    {{- range .rules }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix | quote }}
      backendRefs:
        - name: {{ .serviceName }}
          port: {{ .servicePort }}
    {{- end }}
{{- end }}
