# Values for Helm release `nginx2` (chart: deploy/helm/nginx-sample).
# Change image.tag, push, then run workflow "Helm deploy nginx2" to test upgrades.
#
# Rollback:
#   helm history nginx2 -n <namespace>
#   helm rollback nginx2 -n <namespace>
#   helm rollback nginx2 <revision> -n <namespace>

replicaCount: 1

fullnameOverride: "nginx2"

image:
  repository: nginx
  tag: "1.25"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80
